# Hyprland — tuned for low-power / iGPU (blur off, no shadows, no animations).
# Eye candy: see docs/system-optimization.md → optional hyprland.local.conf

monitor = ,preferred,auto,1
# monitor=DP-1,2560x1440@165,0x0,1
# monitor=HDMI-A-1,1920x1080@60,2560x0,1

workspace = w[t1], gapsout:0, gapsin:0
workspace = w[tg1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

# Waybar matches hyprland/workspaces icons by workspace *name* (not id). Without defaultName,
# Hyprland often reports an empty name for 11–18 → broken/blank labels. Names 一…八 also need
# a CJK font in Waybar (see install.sh + waybar style).
workspace = 11, defaultName:一, persistent:true
workspace = 12, defaultName:二, persistent:true
workspace = 13, defaultName:三, persistent:true
workspace = 14, defaultName:四, persistent:true
workspace = 15, defaultName:五, persistent:true
workspace = 16, defaultName:六, persistent:true
workspace = 17, defaultName:七, persistent:true
workspace = 18, defaultName:八, persistent:true

# Smart gaps (tiled only on these workspace selectors) — windowrulev2 removed in Hyprland 0.48+
windowrule = border_size 0, match:float 0, match:workspace w[t1]
windowrule = rounding 0, match:float 0, match:workspace w[t1]
windowrule = border_size 0, match:float 0, match:workspace w[tg1]
windowrule = rounding 0, match:float 0, match:workspace w[tg1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

input {
    follow_mouse = 1
    repeat_delay = 400
    repeat_rate = 40
    kb_layout = us
    scroll_factor = 1.05
    sensitivity = 0.0
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 2
    gaps_out = 3
    border_size = 1
    col.active_border = 0xffa6e3a1
    col.inactive_border = 0xff585b70
    layout = dwindle
    allow_tearing = false
}

cursor {
    no_hardware_cursors = true
}

decoration {
    rounding = 6
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

dwindle {
    pseudotile = 0
    force_split = 2
}

binds {
    scroll_event_delay = 0
    allow_workspace_cycles = true
}

misc {
    disable_hyprland_logo = true
    vfr = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

render {
    direct_scanout = false
}

layerrule = no_anim on, match:namespace selection
layerrule = no_anim on, match:namespace showkeys

animations {
    enabled = false
}

# ── Autostart ─────────────────────────────────────────────
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Adwaita-dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme Papirus-Dark
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sh -c "rm -f /tmp/wobpipe && mkfifo /tmp/wobpipe && tail -f /tmp/wobpipe | wob"
exec-once = sh ~/.config/hypr/cleanup_after_start.sh

env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland

windowrule = border_size 3, match:class Dunst
windowrule = opacity 0.0 override 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_focus on, match:class ^(xwaylandvideobridge)$

# ── Binds ─────────────────────────────────────────────────
bind = SUPER, Return, exec, ghostty -e sh ~/.config/scripts/new_tmux_terminal.sh
bind = SUPERSHIFT, Return, exec, ghostty -e sh ~/.config/scripts/new_tmux_session_temporary.sh
bind = SUPERCTRL, Return, exec, ghostty

bind = SUPER, Q, killactive
bind = SUPER SHIFT, M, exit
bind = SUPER, F, exec, pkill wofi || wofi --show drun
bind = SUPER, B, exec, firefox
bind = SUPER, 4, togglefloating
bind = SUPER, 3, fullscreen

bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER, M, splitratio, -0.05
bind = SUPER, N, cyclenext
bind = SUPER, E, cyclenext, prev
bind = SUPERSHIFT, N, swapnext
bind = SUPERSHIFT, E, swapnext, prev
bind = SUPER, I, splitratio, 0.05

bind = SUPER, R, workspace, 11
bind = SUPER, S, workspace, 12
bind = SUPER, T, workspace, 13
bind = SUPER, X, workspace, 14
bind = SUPER, C, workspace, 15
bind = SUPER, D, workspace, 16
bind = SUPER, G, workspace, 17
bind = SUPER, V, workspace, 18

bind = SUPERCTRL, R, movetoworkspace, 11
bind = SUPERCTRL, S, movetoworkspace, 12
bind = SUPERCTRL, T, movetoworkspace, 13
bind = SUPERCTRL, X, movetoworkspace, 14
bind = SUPERCTRL, C, movetoworkspace, 15
bind = SUPERCTRL, D, movetoworkspace, 16
bind = SUPERCTRL, G, movetoworkspace, 17
bind = SUPERCTRL, V, movetoworkspace, 18

bind = SUPER, mouse_down, workspace, e-1
bind = SUPER, mouse_up, workspace, e+1

bind = SUPERSHIFT, l, exec, sh ~/.config/scripts/lock
bind = SUPERSHIFT, z, exec, sh ~/.config/scripts/switch_keyboard_layout.sh

bind = SUPER, w, exec, sh -c "pamixer -d 2; pamixer --get-volume > /tmp/wobpipe"
bind = SUPER, p, exec, sh -c "pamixer -i 2; pamixer --get-volume > /tmp/wobpipe"
bind = SUPER, 2, exec, pamixer -t
bind = SUPER, u, exec, hyprshot -m region
bind = SUPER, y, exec, sh ~/.config/hypr/record.sh
bind = SUPER, l, exec, hyprshot -m output

# Numeric workspaces (Super+2 is mute; use Alt+digit)
bind = SUPER ALT, 1, workspace, 1
bind = SUPER ALT, 2, workspace, 2
bind = SUPER ALT, 3, workspace, 3
bind = SUPER ALT, 4, workspace, 4
bind = SUPER ALT, 5, workspace, 5
bind = SUPER ALT, 6, workspace, 6
bind = SUPER ALT, 7, workspace, 7
bind = SUPER ALT, 8, workspace, 8
bind = SUPER ALT, 9, workspace, 9

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPERSHIFT, mouse:276, killactive

exec-once = hyprctl dispatch workspace 11

source = ~/.config/hypr/hyprland.local.conf
