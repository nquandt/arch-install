# ── Monitor ───────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Autostart ─────────────────────────────────────────────
exec-once = waybar
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Environment ───────────────────────────────────────────
env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland

# ── Input ─────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    repeat_delay = 400
    repeat_rate = 40
    sensitivity = 0.0
    touchpad {
        natural_scroll = true
    }
}

# ── General ───────────────────────────────────────────────
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = 0xffa6e3a1
    col.inactive_border = 0xff585b70
    layout = dwindle
    no_border_on_floating = true
    allow_tearing = false
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 3
        passes = 2
        brightness = 1
        contrast = 1
    }

    shadow {
        enabled = true
        range = 7
        render_power = 3
        offset = 0 0
    }
}

# ── Animations ────────────────────────────────────────────
animations {
    enabled = true

    bezier = md3_decel,  0.05, 0.7, 0.1, 1
    bezier = md3_accel,  0.3,  0,   0.8, 0.15
    bezier = menu_decel, 0.1,  1,   0,   1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07

    animation = windows,         1, 3, md3_decel, popin 60%
    animation = windowsIn,       1, 3, md3_decel, popin 60%
    animation = windowsOut,      1, 3, md3_accel, popin 60%
    animation = fade,            1, 3, md3_decel
    animation = layersIn,        1, 3, menu_decel, slide
    animation = layersOut,       1, 2, menu_accel
    animation = workspaces,      1, 3, menu_decel, slidefade 20%
    animation = specialWorkspace,1, 3, md3_decel,  slidevert
}

# ── Layout ────────────────────────────────────────────────
dwindle {
    pseudotile = false
    force_split = 2
}

# ── Misc ──────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    vfr = true
    animate_manual_resizes = false
}

# ── Cursor ────────────────────────────────────────────────
cursor {
    no_hardware_cursors = true
}

# ── Binds ─────────────────────────────────────────────────
binds {
    allow_workspace_cycles = true
}

# ── Layer rules ───────────────────────────────────────────
layerrule = blur, waybar
layerrule = blur, wofi
layerrule = ignorezero, wofi

# ── Keybinds ──────────────────────────────────────────────
$mod = SUPER

# Apps
bind = $mod,       Return,     exec, ghostty
bind = $mod,       Space,      exec, wofi --show drun
bind = $mod,       Q,          killactive
bind = $mod,       M,          exit
bind = $mod,       4,          togglefloating
bind = $mod,       3,          fullscreen

# Focus
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Cycle windows
bind = $mod, N, cyclenext
bind = $mod, E, cyclenext, prev

# Swap windows
bind = $mod SHIFT, N, swapnext
bind = $mod SHIFT, E, swapnext, prev

# Resize
bind = $mod, M, splitratio, -0.05
bind = $mod, I, splitratio,  0.05

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3  
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll workspaces
bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up,   workspace, e+1

# Mouse window management
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind  = $mod SHIFT, mouse:276, killactive

# Screenshot
bind = $mod, P, exec, hyprshot -m region
