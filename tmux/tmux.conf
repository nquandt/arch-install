# ── Prefix ────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── General ───────────────────────────────────────────────
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g status-keys vi

# ── True Color ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Clipboard (Wayland) ───────────────────────────────────
set -g set-clipboard off
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# ── Vi mode ───────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Splits ────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Window navigation ─────────────────────────────────────
bind -n PageDown next-window
bind -n PageUp   previous-window

bind N swap-window -d -t +1
bind E swap-window -d -t -1

bind -n F7 copy-mode
bind -n F8 choose-tree -Zw

# ── Pane styling ──────────────────────────────────────────
set -g pane-border-style       "fg=#45475a,bg=default"
set -g pane-active-border-style "fg=#cba6f7,bg=default"
set -g pane-border-lines heavy

set -g popup-style        "fg=default,bg=#181825"
set -g popup-border-style "fg=#1e1e2e,bg=#181825"
set -g popup-border-lines heavy

set -g window-style        'bg=default'
set -g window-active-style 'bg=default'

# ── Status Bar (Catppuccin Mocha) ─────────────────────────
accent="#cba6f7"
bg1="#45475a"
fg1="#313244"
bg2="#1e1e2e"
fg2="#cdd6f4"

set -g status-position top
set -g status-style "bg=default fg=${fg2}"

set -g status-left  "#[bg=${accent},fg=${bg2},bold] #S #[fg=${accent},bg=${fg1}]#[bg=${fg1},fg=${fg2}] "
set -g status-right "#[bg=default,fg=${bg1}]#[bg=${bg1},fg=${fg2}] %I:%M %p #[fg=${bg1},bg=default]"
set -g status-left-length  30
set -g status-right-length 50

set -g window-status-separator ""
set -g window-status-format         "#[fg=${bg1},bg=${fg1}]#[bg=${bg1},fg=${fg2}] #I #[fg=${bg1},bg=${fg1}]#[bg=${fg1},fg=${fg2}] #W  "
set -g window-status-current-format "#[bg=${fg1},fg=${accent}]#[bg=${accent},fg=${bg2},bold] #I #[bg=${fg1},fg=${accent}]#[bg=${fg1},fg=${accent}] #W  "

set-window-option -g mode-style "bg=${accent} fg=${bg2}"
set-option -g status-justify left

# ── Plugins ───────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
