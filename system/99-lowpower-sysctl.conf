# Low-power / small desktop — applied by install.sh → /etc/sysctl.d/
# Tweak or remove if you dislike behavior.

# Prefer keeping pages in RAM; pair with zram swap
vm.swappiness = 10

# Slightly reduce inode/dentry reclaim pressure on SSD
vm.vfs_cache_pressure = 50

# Flush writes a bit sooner (smoother on low-RAM; tiny disk cost)
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# Disable NMI watchdog (saves a little power / interrupts)
kernel.nmi_watchdog = 0
